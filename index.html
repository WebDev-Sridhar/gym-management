<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gymmobius | Run Your Gym Like a Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@400..700&family=Delius&family=Do+Hyeon&family=Frijole&family=Lexend+Deca:wght@100..900&family=Luckiest+Guy&family=Port+Lligat+Slab&family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Alexandria&family=Nova+Square&family=Overlock+SC&family=Viga&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js" async defer data-razorpay-checkout="true"></script>
    <script>
      /* Anti-flash: apply the saved theme before React mounts. Sync with src/store/ThemeContext.jsx */
      (function () {
        try {
          var t = localStorage.getItem('gymmobius-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
