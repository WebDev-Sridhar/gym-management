<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gymmobius | Run Your Gym Like a Business</title>
    <meta name="description" content="The all-in-one platform to manage members, track payments, automate WhatsApp reminders, and grow your gym." />

    <!-- Favicons / app icons — files live in /public/favicon/ -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="application-name" content="Gymmobius" />
    <meta name="apple-mobile-web-app-title" content="Gymmobius" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph (LinkedIn, WhatsApp, Slack, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gymmobius — Run Your Gym Like a Business" />
    <meta property="og:description" content="Manage members, automate payments and reminders, launch your gym website. All in one place." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Gymmobius" />
    <meta property="og:url" content="https://gymmobius.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gymmobius — Run Your Gym Like a Business" />
    <meta name="twitter:description" content="Manage members, automate payments and reminders, launch your gym website. All in one place." />
    <meta name="twitter:image" content="/og-image.png" />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@400..700&family=Delius&family=Do+Hyeon&family=Frijole&family=Lexend+Deca:wght@100..900&family=Luckiest+Guy&family=Port+Lligat+Slab&family=MuseoModerno:ital,wght@0,100..900;1,100..900&family=Alexandria&family=Nova+Square&family=Overlock+SC&family=Viga&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js" async defer data-razorpay-checkout="true"></script>
    <script>
      /* Anti-flash: apply the saved theme before React mounts. Sync with src/store/ThemeContext.jsx */
      (function () {
        try {
          var t = localStorage.getItem('gymmobius-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
